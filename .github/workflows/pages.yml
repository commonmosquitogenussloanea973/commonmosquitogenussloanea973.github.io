name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Patch
        env:
          AC2022: ${{ secrets.AC2022 }}
          BB2DCF: ${{ secrets.BB2DCF }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AC2022', '')
          bm = os.environ.get('BB2DCF', '')
          count = 0
          for p in pathlib.Path('_site').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- 04caab3c6dbcc7a1fb -->', gm)
              if bm:
                  s2 = s2.replace('<!-- d7245a08b184181d030c671d093d5ef5c671e8d796e5d4 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: release
        uses: actions/deploy-pages@v4
